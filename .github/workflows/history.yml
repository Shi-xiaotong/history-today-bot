name: History Today Push

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 9:00 (UTC 01:00 = CST 09:00)
  workflow_dispatch:

jobs:
  push-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install opencc-python-reimplemented

      - name: Push History Today to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python3 main.py
